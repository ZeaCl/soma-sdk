services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: soma_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 10

  soma:
    build:
      context: ../soma
      dockerfile: Dockerfile
      target: runtime
    environment:
      DATABASE_URL: "ecto://postgres:postgres@postgres:5432/soma_test"
      SECRET_KEY_BASE: "test-secret-key-base-64-bytes-minimum-for-testing-purposes-only"
      MIX_ENV: prod
      PORT: 4084
      PHX_HOST: localhost
    ports:
      - "4084:4084"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:4084/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s
