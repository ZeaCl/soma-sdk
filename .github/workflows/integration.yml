name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ZeaCl/soma
          path: ../soma

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'npm' }

      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Integration test with Soma
        run: ./scripts/integration-test.sh
